# Cloud Build: GitHub push → npm build (GCP/Nitro) → Artifact Registry → Cloud Run.
#
# One-time (Console or gcloud):
#   gcloud config set project damalight
#   gcloud services enable cloudbuild.googleapis.com run.googleapis.com artifactregistry.googleapis.com
#   gcloud artifacts repositories create dama-mob --repository-format=docker --location=asia-south1
#
# Connect GitHub: Cloud Build → Repositories → Connect repository → GitHub → select myrobot2020/dama-mob
# Create trigger: branch ^main$, config: /cloudbuild.yaml, service account with roles:
#   Cloud Build Editor, Artifact Registry Writer, Cloud Run Admin (or custom least-privilege).
#
substitutions:
  # Mumbai (South Asia). Artifact Registry + Cloud Run deploy target.
  _REGION: asia-south1
  _SERVICE_NAME: dama-mob
  _AR_REPO: dama-mob

steps:
  # npm ci was failing: lockfile peer trees differ from npm's strict ci check (nitro/unstorage peers).
  - id: install
    name: node:22
    dir: .
    env:
      - CI_GCP=1
    args: ["npm", "install", "--no-audit", "--no-fund"]

  - id: build
    name: node:22
    dir: .
    env:
      - CI_GCP=1
    args: ["npm", "run", "build"]

  - id: docker-build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:latest
      - .

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --quiet

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:latest

options:
  logging: CLOUD_LOGGING_ONLY
